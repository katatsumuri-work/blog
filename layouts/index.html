{{ define "main" }}
<p class="lead">{{ .Site.Params.description }}</p>
<ul class="post-list">
  {{ range (where .Site.RegularPages "Section" "posts") }}
  <li>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </li>
  {{ end }}
</ul>
{{ end }}
