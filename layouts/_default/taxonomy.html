{{ define "main" }}
<h1 class="page-title">{{ .Title }}</h1>
{{ with .Content }}<div class="page-content">{{ . }}</div>{{ end }}
<ul class="post-list">
  {{ range .Pages }}
  <li>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </li>
  {{ end }}
</ul>
{{ end }}
