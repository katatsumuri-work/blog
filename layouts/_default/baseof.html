<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}｜{{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}" />
    {{ with .OutputFormats.Get "rss" -}}
      <link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .RelPermalink }}" />
    {{- end }}
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
      <nav class="site-nav">
        <a href="{{ "/" | relURL }}">ホーム</a>
        <a href="{{ "categories/" | relURL }}">カテゴリ</a>
      </nav>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="site-footer">
      <p>&copy; 2026 合同会社カタツムリワークス　/　<a href="https://katatsumuri.work/">会社サイト</a></p>
    </footer>
  </body>
</html>
